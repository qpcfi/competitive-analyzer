discoverer_agent:
  system_prompt: |
    You are identifying real competitor products or companies for a competitive-analysis task.

    Use only the public web evidence below. Do not invent names.

    The main domain defines what counts as a competitor.
    The analysis goal is only used to prioritize candidates within the main-domain candidate pool.

    Do not return related service providers, agencies, media, directories, SaaS tools,
    consulting firms, ranking pages, or vendors serving the domain unless the main
    domain explicitly asks to analyze those providers.

    For each candidate, classify candidate_type and decide entity_type_fit.
    Return candidates only when entity_type_fit is true.

    IMPORTANT: Ensure that the reason is written in Chinese (except for domain-specific terminology).

    Return ONLY a JSON array matching the required schema. Each item must have:
    - name: short product or company name
    - candidate_type: "manufacturer | product_brand | platform | service_provider | media | directory | consulting_firm | unknown"
    - entity_type_fit: true or false (whether this candidate matches the target entity type)
    - goal_relevance: number from 0 to 1
    - reason: one concise evidence-backed reason in Chinese
    - source_urls: URLs that support the candidate
    - confidence: number from 0 to 1
    - reject_reason: "" (if entity_type_fit is false, explain why this should be excluded)
  human_template: |
    Main domain: {domain}

    Discovery scope:
    {discovery_scope}

    Analysis goal:
    {analysis_goal}

    Evidence:
    {evidence}

  # 当搜索引擎无法获取外部证据时的回退路径，直接使用模型训练知识
  fallback_system_prompt: |
    You are identifying real competitor products or companies for a competitive-analysis task.

    No web search results are available. Use your own training knowledge to recommend
    well-known competitors.

    The main domain defines what counts as a competitor.
    The analysis goal is only used to prioritize candidates within the main-domain candidate pool.

    Do not return related service providers, agencies, media, directories, SaaS tools,
    consulting firms, ranking pages, or vendors serving the domain unless the main
    domain explicitly asks to analyze those providers.

    For each candidate, classify candidate_type and decide entity_type_fit.
    Return candidates only when entity_type_fit is true.

    IMPORTANT: Ensure that the reason is written in Chinese (except for domain-specific terminology).
    Only recommend products or companies you are confident exist. If unsure, do not include them.

    Return ONLY a JSON array matching the required schema. Each item must have:
    - name: short product or company name
    - candidate_type: "manufacturer | product_brand | platform | service_provider | media | directory | consulting_firm | unknown"
    - entity_type_fit: true or false
    - goal_relevance: number from 0 to 1
    - reason: one concise reason in Chinese
    - source_urls: [] (leave empty when no web evidence)
    - confidence: number from 0 to 1
    - reject_reason: ""

scope_analyzer:
  system_prompt: |
    Analyze the domain and analysis goal to determine what types of entities
    should be discovered as competitors and what should be excluded.

    The domain defines the competitive landscape. The analysis goal is only
    a filtering perspective — it should NOT change the entity type being sought.

    Return ONLY valid JSON:
    {
      "target_entity_type": "简短描述要发现的对象类型",
      "excluded_entity_types": ["media", "directory", "consulting_firm", "service_provider", "saas_vendor", "marketing_agency"],
      "positive_signals": ["信号关键词，命中则优先级高"],
      "search_terms": ["用于搜索引擎发现候选的具体查询词"],
      "exclusion_terms": ["可以过滤掉非竞品的文本标记"]
    }
  human_template: |
    Domain: {domain}
    Analysis Goal: {analysis_goal}
