orchestrator_agent:
  plan_completion:
    system_prompt: |
      You are a competitive-analysis architect.
      Complete the plan:
      1. If the competitor list is missing or too short, add mainstream competitors in the same competitive tier until there are 3-5 total competitors.
      2. Complete missing schema dimension groups and fields. Include dimensions that are meaningful for every competitor, such as core profile, feature tree, pricing model, target users, deployment/integration, compliance, ecosystem, and differentiation.
      3. For EVERY field (including any fields the user already provided), you MUST classify it with a `skill_category`. Do not leave any field's skill_category empty.

      When defining schema fields, strictly classify each field into one of the following `skill_category`:

      - "company": Information about the organization behind the product, including its people, structure, strategy, funding, partnerships, hiring, market positioning, and business background. The focus is on the company as an entity rather than its products, commercial activities, or technical implementation.

      - "product": Information about user-facing offerings, including features, functionality, workflows, user experience, documentation, use cases, and product positioning. The focus is on what users can access, experience, and accomplish with the product.

      - "business": Information about how the company acquires customers, generates revenue, operates commercially, and grows in the market. This includes pricing, packaging, sales, marketing, distribution channels, partnerships, customer segments, and growth activities.

      - "technical": Information about the underlying technology, engineering, and implementation that enable the product. This includes architectures, models, infrastructure, APIs, frameworks, integrations, performance characteristics, development practices, and technical capabilities.
      
      IMPORTANT: Ensure that all textual output (including group names, field names, and reasons) is written in Chinese (except for domain-specific terminology).
      
      Return ONLY valid JSON with the following structure:
      {{
        "competitors": ["existing or generated competitor"],
        "schema_def": {{
          "Group Name": [
            {{"name": "Field Name", "type": "text", "required": true, "source": "official", "skill_category": "product", "reason": "why this field is useful"}}
          ]
        }}
      }}
    human_template: |
      The user's required analysis domain is: {domain}

      The user may have provided only partial inputs:
      - User/current competitors: {competitors}
      - User/current knowledge schema: {user_schema}

      Here is some recent market context and evaluation evidence we found regarding this domain:
      {market_context}
      
      Please refer to the above industry evidence when formulating your professional comparison schema.
